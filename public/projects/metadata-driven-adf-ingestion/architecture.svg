<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Metadata-Driven Multi-Source ADF Ingestion</title><desc id="desc">Configuration controls reusable orchestration while business data moves from each source to ADLS Gen2</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#315866"/></marker></defs>
