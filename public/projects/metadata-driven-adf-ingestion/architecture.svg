<text x="90" y="145" font-family="Arial, Helvetica, sans-serif" font-size="23" fill="#536d77">Configuration controls reusable orchestration while business data moves from each source to ADLS Gen2</text>
<g font-family="Arial, Helvetica, sans-serif"><g><rect x="80" y="210" width="280" height="118" rx="14" fill="#fff" stroke="#5c8797" stroke-width="2"/><circle cx="108" cy="238" r="16" fill="#087ea4"/><text x="108" y="245" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">1</text><text x="220" y="258" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">SQL Sources</text><text x="220" y="287" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">Database input</text><line x1="360" y1="269" x2="610" y2="390" stroke="#315866" stroke-width="4" marker-end="url(#arrow)"/></g><g><rect x="80" y="365" width="280" height="118" rx="14" fill="#fff" stroke="#5c8797" stroke-width="2"/><circle cx="108" cy="393" r="16" fill="#087ea4"/><text x="108" y="400" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">2</text><text x="220" y="413" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">REST or HTTP</text><text x="220" y="442" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">Endpoint input</text><line x1="360" y1="424" x2="610" y2="390" stroke="#315866" stroke-width="4" marker-end="url(#arrow)"/></g><g><rect x="80" y="520" width="280" height="118" rx="14" fill="#fff" stroke="#5c8797" stroke-width="2"/><circle cx="108" cy="548" r="16" fill="#087ea4"/><text x="108" y="555" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">3</text><text x="220" y="568" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">File Sources</text><text x="220" y="597" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">Configured files</text><line x1="360" y1="579" x2="610" y2="390" stroke="#315866" stroke-width="4" marker-end="url(#arrow)"/></g>
  <g><rect x="610" y="300" width="330" height="180" rx="14" fill="#eef7fa" stroke="#5c8797" stroke-width="2"/><text x="775" y="360" text-anchor="middle" font-size="22" font-weight="700" fill="#18313c">Azure Data Factory</text><text x="775" y="391" text-anchor="middle" font-size="22" font-weight="500" fill="#18313c">Lookup - ForEach</text><text x="775" y="422" text-anchor="middle" font-size="22" font-weight="500" fill="#18313c">source-type routing</text></g>
