  <g><rect x="610" y="180" width="330" height="82" rx="12" fill="#fff8e8" stroke="#9a7b38" stroke-width="2"/><text x="775" y="215" text-anchor="middle" font-size="19" font-weight="700" fill="#18313c">ADLS Metadata Configuration</text><text x="775" y="240" text-anchor="middle" font-size="19" font-weight="500" fill="#18313c">source, target and load rules</text></g>
