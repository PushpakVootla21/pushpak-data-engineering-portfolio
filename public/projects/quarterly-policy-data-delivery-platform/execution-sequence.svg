<title id="title">Quarterly ADF and Databricks Execution Sequence</title><desc id="desc">Numbered source-to-Raw execution from prechecks to downstream availability</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#315866"/></marker></defs>
<rect width="1600" height="900" fill="#ffffff"/><rect x="45" y="42" width="1510" height="816" rx="24" fill="#f7fafb" stroke="#b9cdd5" stroke-width="2"/>
<text x="90" y="105" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#142a34">Quarterly ADF and Databricks Execution Sequence</text>
<text x="90" y="145" font-family="Arial, Helvetica, sans-serif" font-size="23" fill="#536d77">Numbered source-to-Raw execution from prechecks to downstream availability</text>
<g font-family="Arial, Helvetica, sans-serif"><g><rect x="80" y="205" width="273.6" height="128" rx="12" fill="#fff" stroke="#648b99" stroke-width="2"/><circle cx="107" cy="232" r="16" fill="#087ea4"/><text x="107" y="239" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">1</text><text x="216.8" y="267" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Run quarterly</text><text x="216.8" y="289" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">prechecks</text></g><g><rect x="371.6" y="205" width="273.6" height="128" rx="12" fill="#eef7fa" stroke="#648b99" stroke-width="2"/><circle cx="398.6" cy="232" r="16" fill="#087ea4"/><text x="398.6" y="239" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">2</text><text x="508.40000000000003" y="267" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Read framework</text><text x="508.40000000000003" y="289" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">metadata</text></g><g><rect x="663.2" y="205" width="273.6" height="128" rx="12" fill="#fff" stroke="#648b99" stroke-width="2"/><circle cx="690.2" cy="232" r="16" fill="#087ea4"/><text x="690.2" y="239" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">3</text><text x="800" y="267" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Copy selected SQL</text><text x="800" y="289" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">tables to Landing</text></g><g><rect x="954.8000000000001" y="205" width="273.6" height="128" rx="12" fill="#eef7fa" stroke="#648b99" stroke-width="2"/><circle cx="981.8000000000001" cy="232" r="16" fill="#087ea4"/><text x="981.8000000000001" y="239" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">4</text><text x="1091.6000000000001" y="267" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Start Raw-stage</text><text x="1091.6000000000001" y="289" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">framework log</text></g><g><rect x="1246.4" y="205" width="273.6" height="128" rx="12" fill="#fff" stroke="#648b99" stroke-width="2"/><circle cx="1273.4" cy="232" r="16" fill="#087ea4"/><text x="1273.4" y="239" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">5</text><text x="1383.2" y="267" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Invoke Databricks</text><text x="1383.2" y="289" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">Landing-to-Raw</text><text x="1383.2" y="311" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">notebook</text></g><g><rect x="80" y="365" width="273.6" height="128" rx="12" fill="#eef7fa" stroke="#648b99" stroke-width="2"/><circle cx="107" cy="392" r="16" fill="#087ea4"/><text x="107" y="399" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">6</text><text x="216.8" y="427" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Validate parameters,</text><text x="216.8" y="449" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">paths, files and</text><text x="216.8" y="471" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">tables</text></g><g><rect x="371.6" y="365" width="273.6" height="128" rx="12" fill="#fff" stroke="#648b99" stroke-width="2"/><circle cx="398.6" cy="392" r="16" fill="#087ea4"/><text x="398.6" y="399" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">7</text><text x="508.40000000000003" y="427" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Read Landing Parquet</text><text x="508.40000000000003" y="449" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">files</text></g><g><rect x="663.2" y="365" width="273.6" height="128" rx="12" fill="#eef7fa" stroke="#648b99" stroke-width="2"/><circle cx="690.2" cy="392" r="16" fill="#087ea4"/><text x="690.2" y="399" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">8</text><text x="800" y="427" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Validate input data</text></g><g><rect x="954.8000000000001" y="365" width="273.6" height="128" rx="12" fill="#fff" stroke="#648b99" stroke-width="2"/><circle cx="981.8000000000001" cy="392" r="16" fill="#087ea4"/><text x="981.8000000000001" y="399" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">9</text><text x="1091.6000000000001" y="427" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Derive quarter_code</text></g><g><rect x="1246.4" y="365" width="273.6" height="128" rx="12" fill="#eef7fa" stroke="#648b99" stroke-width="2"/><circle cx="1273.4" cy="392" r="16" fill="#087ea4"/><text x="1273.4" y="399" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">10</text><text x="1383.2" y="427" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Write quarter</text><text x="1383.2" y="449" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">partition to Raw</text><text x="1383.2" y="471" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">Delta</text></g><g><rect x="80" y="525" width="346.5" height="128" rx="12" fill="#fff" stroke="#648b99" stroke-width="2"/><circle cx="107" cy="552" r="16" fill="#087ea4"/><text x="107" y="559" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">11</text><text x="253.25" y="587" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Create or refresh</text><text x="253.25" y="609" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">Unity Catalog table</text></g><g><rect x="444.5" y="525" width="346.5" height="128" rx="12" fill="#eef7fa" stroke="#648b99" stroke-width="2"/><circle cx="471.5" cy="552" r="16" fill="#087ea4"/><text x="471.5" y="559" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">12</text><text x="617.75" y="587" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Validate partition,</text><text x="617.75" y="609" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">rows and Delta output</text></g><g><rect x="809" y="525" width="346.5" height="128" rx="12" fill="#fff" stroke="#648b99" stroke-width="2"/><circle cx="836" cy="552" r="16" fill="#087ea4"/><text x="836" y="559" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">13</text><text x="982.25" y="587" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Return structured</text><text x="982.25" y="609" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">notebook result</text></g><g><rect x="1173.5" y="525" width="346.5" height="128" rx="12" fill="#eef7fa" stroke="#648b99" stroke-width="2"/><circle cx="1200.5" cy="552" r="16" fill="#087ea4"/><text x="1200.5" y="559" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">14</text><text x="1346.75" y="587" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Validate status and</text><text x="1346.75" y="609" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">failed_count in ADF</text></g><g><rect x="80" y="685" width="346.5" height="128" rx="12" fill="#fff" stroke="#648b99" stroke-width="2"/><circle cx="107" cy="712" r="16" fill="#087ea4"/><text x="107" y="719" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">15</text><text x="253.25" y="747" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Update Raw-stage log</text></g><g><rect x="444.5" y="685" width="346.5" height="128" rx="12" fill="#eef7fa" stroke="#648b99" stroke-width="2"/><circle cx="471.5" cy="712" r="16" fill="#087ea4"/><text x="471.5" y="719" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">16</text><text x="617.75" y="747" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Update watermark</text></g><g><rect x="809" y="685" width="346.5" height="128" rx="12" fill="#fff" stroke="#648b99" stroke-width="2"/><circle cx="836" cy="712" r="16" fill="#087ea4"/><text x="836" y="719" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">17</text><text x="982.25" y="747" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Record master success</text></g><g><rect x="1173.5" y="685" width="346.5" height="128" rx="12" fill="#eef7fa" stroke="#648b99" stroke-width="2"/><circle cx="1200.5" cy="712" r="16" fill="#087ea4"/><text x="1200.5" y="719" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">18</text><text x="1346.75" y="747" text-anchor="middle" font-size="20" font-weight="700" fill="#18313c">Make datasets</text><text x="1346.75" y="769" text-anchor="middle" font-size="20" font-weight="500" fill="#18313c">available downstream</text></g></g></svg>